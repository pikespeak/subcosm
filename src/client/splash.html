<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" href="splash.css" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width, height=device-height, user-scalable=0"
    />
    <title>Subcosm</title>
  </head>

  <!-- D-09 in-feed splash card: a fast, RELIABLE static teaser — NOT a live
       mini-render (RESEARCH Q4 Pitfall 6; iOS throttles cross-origin-iframe rAF
       to 30fps until interaction, so the first impression judges see must be
       static). One-line pitch hook + a static SVG cosmos motif + a clear
       open/play CTA wired to the existing requestExpandedMode(e,'game').
       All copy carries its i18n key in data-i18n (host localises); the English
       source is the visible fallback (CLAUDE.md §7) — never user-echoed text. -->
  <body class="app">
    <!-- Static teaser: a lightweight inline SVG cosmos motif harmonising with the
         Techno cyan↔magenta palette (genesis core + long cross-flare + concentric
         day-shells), echoing docs/subcosm.png. No canvas, no Phaser, no rAF. -->
    <div class="teaser" aria-hidden="true">
      <svg
        class="teaser-svg"
        viewBox="0 0 320 320"
        xmlns="http://www.w3.org/2000/svg"
        role="img"
      >
        <defs>
          <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#fff7e6" stop-opacity="1" />
            <stop offset="22%" stop-color="#fff7e6" stop-opacity="0.85" />
            <stop offset="55%" stop-color="#d946ef" stop-opacity="0.35" />
            <stop offset="100%" stop-color="#04030a" stop-opacity="0" />
          </radialGradient>
          <linearGradient id="flareH" x1="0%" y1="50%" x2="100%" y2="50%">
            <stop offset="0%" stop-color="#46e0d8" stop-opacity="0" />
            <stop offset="50%" stop-color="#fff7e6" stop-opacity="0.9" />
            <stop offset="100%" stop-color="#46e0d8" stop-opacity="0" />
          </linearGradient>
          <linearGradient id="flareV" x1="50%" y1="0%" x2="50%" y2="100%">
            <stop offset="0%" stop-color="#d946ef" stop-opacity="0" />
            <stop offset="50%" stop-color="#fff7e6" stop-opacity="0.9" />
            <stop offset="100%" stop-color="#d946ef" stop-opacity="0" />
          </linearGradient>
        </defs>

        <!-- Concentric day-shells: depth = time. Each ring is one day; the
             outermost is the freezing frontier (faintest). -->
        <circle cx="160" cy="160" r="138" fill="none" stroke="#46e0d8" stroke-opacity="0.10" stroke-width="1" />
        <circle cx="160" cy="160" r="110" fill="none" stroke="#6366f1" stroke-opacity="0.16" stroke-width="1" />
        <circle cx="160" cy="160" r="84" fill="none" stroke="#d946ef" stroke-opacity="0.20" stroke-width="1" />
        <circle cx="160" cy="160" r="58" fill="none" stroke="#46e0d8" stroke-opacity="0.26" stroke-width="1" />
        <circle cx="160" cy="160" r="34" fill="none" stroke="#fff7e6" stroke-opacity="0.30" stroke-width="1" />

        <!-- A scatter of stars across the shells. -->
        <g fill="#fff7e6">
          <circle cx="206" cy="96" r="1.4" fill-opacity="0.9" />
          <circle cx="98" cy="120" r="1.1" fill-opacity="0.7" />
          <circle cx="228" cy="190" r="1.2" fill-opacity="0.8" />
          <circle cx="120" cy="226" r="1.0" fill-opacity="0.6" />
          <circle cx="76" cy="180" r="1.3" fill-opacity="0.75" fill="#46e0d8" />
          <circle cx="244" cy="138" r="1.1" fill-opacity="0.7" fill="#d946ef" />
          <circle cx="160" cy="44" r="1.2" fill-opacity="0.8" />
          <circle cx="58" cy="92" r="0.9" fill-opacity="0.55" />
          <circle cx="262" cy="232" r="1.0" fill-opacity="0.6" fill="#46e0d8" />
          <circle cx="190" cy="252" r="1.1" fill-opacity="0.65" />
        </g>

        <!-- The genesis core + long cross-flare (the logo signature). -->
        <circle cx="160" cy="160" r="64" fill="url(#coreGlow)" />
        <rect x="8" y="158" width="304" height="4" fill="url(#flareH)" />
        <rect x="158" y="8" width="4" height="304" fill="url(#flareV)" />
        <circle cx="160" cy="160" r="6" fill="#fff7e6" />
      </svg>
    </div>

    <div class="content">
      <h1 class="wordmark" id="wordmark" data-i18n="splash.wordmark">SUBCOSM</h1>
      <p class="hook" id="hook" data-i18n="splash.hook">
        a universe grown from your community
      </p>
    </div>

    <button class="start-button" id="start-button" type="button" data-i18n="splash.cta">
      Enter the cosmos
    </button>

    <script type="module" src="splash.ts" defer></script>
  </body>
</html>
